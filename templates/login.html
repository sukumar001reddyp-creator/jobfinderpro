<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* Flash Messages Alert Style */
.alert-success {
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #c3e6cb;
    border-radius: 8px;
    color: #155724;
    background-color: #d4edda;
    text-align: center;
    font-size: 14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

/* Forgot password section style */
.forgot-container {
    text-align: right;
    margin-top: 8px;
}

.forgot-container a {
    color: #2563eb;
    text-decoration: none;
    font-size: 14px;
}

.forgot-container a:hover {
    text-decoration: underline;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.back-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#6b7280;
    color:white;
    padding:12px;
    border-radius:8px;
    margin-top:15px;
}

.register-link{
    text-align:center;
    margin-top:15px;
}
@media(max-width:768px){

    body{
        padding:15px;
    }

    .box{
        width:100%;
        padding:25px 20px;
        border-radius:12px;
    }

    h2{
        font-size:24px;
    }

    input,
    button,
    .back-btn{
        padding:14px;
        font-size:16px;
    }

}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert-success">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<div class="forgot-container">
    <a href="/forgot-password">Forgot Password?</a>
</div>

<button type="submit">
Login
</button>

</form>

<div class="register-link">
Don't have an account?
<a href="/register">Register</a>
</div>

<a href="/" class="back-btn">
← Back to Home
</a>

</div>

</body>
</html>
