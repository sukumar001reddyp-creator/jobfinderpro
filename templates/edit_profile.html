<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#f5f8ff;
    margin:0;
    padding:40px 20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

button{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#475569;
}

</style>
</head>

<body>

<div class="container">

    <h1>Edit Profile</h1>

    <form method="POST">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   name="name"
                   value="{{ user[0] }}"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   value="{{ user[1] }}"
                   disabled>
        </div>

        <div class="form-group">
            <label>Preferred Job</label>
            <input type="text"
                   name="jobrole"
                   value="{{ user[2] }}"
                   required>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text"
                   name="location"
                   value="{{ user[3] }}"
                   required>
        </div>

        <div class="form-group">
            <label>Experience</label>
            <input type="text"
                   name="experience"
                   value="{{ user[4] }}">
        </div>

        <button type="submit">
            Save Changes
        </button>

    </form>

    <a href="/dashboard" class="back-link">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
