<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    background:#fff;
    width:400px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<p>Enter your registered email address</p>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required>

<button type="submit">
Send Reset Link
</button>

</form>

<a href="/login" class="back">
Back to Login
</a>

</div>

</body>
</html>
