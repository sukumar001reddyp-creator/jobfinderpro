<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    margin:0;
}

.header{
    background:linear-gradient(135deg,#0f172a,#1d4ed8,#7c3aed);
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

.profile{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    text-align:center;
}

.card h3{
    margin-bottom:15px;
}

.card a{
    display:inline-block;
    margin-top:10px;
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
}

.logout{
    display:inline-block;
    margin-top:20px;
    background:#ef4444;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
<h1>Welcome, {{ user[0] }} 👋</h1>
<p>{{ user[2] }} Jobs in {{ user[3] }}</p>
</div>

<div class="container">

<div class="profile">
<h2>Your Preferences</h2>

<p><b>Email:</b> {{ user[1] }}</p>
<p><b>Job Role:</b> {{ user[2] }}</p>
<p><b>Location:</b> {{ user[3] }}</p>
<p><b>Experience:</b> {{ user[4] }}</p>

<a href="/logout" class="logout">Logout</a>
</div>

<div class="cards">

<div class="card">
<h3>💼 LinkedIn Jobs</h3>
<a target="_blank"
href="https://www.linkedin.com/jobs/search/?keywords={{ user[2] }}">
Open Jobs
</a>
</div>

<div class="card">
<h3>💼 Naukri Jobs</h3>
<a target="_blank"
href="https://www.naukri.com/jobs-in-india?keyword={{ user[2] }}">
Open Jobs
</a>
</div>

<div class="card">
<h3>💼 Indeed Jobs</h3>
<a target="_blank"
href="https://in.indeed.com/jobs?q={{ user[2] }}">
Open Jobs
</a>
</div>

<div class="card">
<h3>💼 Foundit Jobs</h3>
<a target="_blank"
href="https://www.foundit.in/srp/results?query={{ user[2] }}">
Open Jobs
</a>
</div>

</div>

</div>

</body>
</html>
