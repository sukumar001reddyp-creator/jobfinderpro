<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:400px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.back-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#6b7280;
    color:white;
    padding:12px;
    border-radius:8px;
    margin-top:15px;
}

.login-link{
    text-align:center;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<input
type="text"
name="jobrole"
placeholder="Preferred Job Role"
required>

<input
type="text"
name="location"
placeholder="Preferred Location"
required>

<select name="experience" required>
<option value="">Select Experience</option>
<option>Fresher</option>
<option>1-3 Years</option>
<option>3-5 Years</option>
<option>5+ Years</option>
</select>

<button type="submit">
Register
</button>

</form>

<div class="login-link">
Already have an account?
<a href="/login">Login</a>
</div>

<a href="/" class="back-btn">
← Back to Home
</a>

</div>

</body>
</html>
