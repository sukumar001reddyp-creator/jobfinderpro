<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Mock Interview Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font Awesome UI Icons -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<style>
:root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    --dark: #0f172a;
    --slate: #475569;
    --light-slate: #94a3b8;
    --bg-body: #f5f8ff;
    --bg-surface: #ffffff;
    --border: #e2e8f0;
    --radius-lg: 16px;
    --radius-md: 12px;
}

/* DARK MODE VARIABLE HUB */
[data-theme="dark"] {
    --dark: #f8fafc;
    --slate: #94a3b8;
    --light-slate: #64748b;
    --bg-surface: #1e293b;
    --bg-body: #0f172a;
    --border: #334155;
}

*{ margin:0; padding:0; box-sizing:border-box; transition: background-color 0.3s ease, border-color 0.3s ease; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--dark); padding: 0 0 30px 0; }

/* --- Navbar --- */
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 4%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
[data-theme="dark"] .navbar { background: rgba(30, 41, 59, 0.9); }
.nav-left { display: flex; align-items: center; gap: 15px; }
.nav-back-arrow { color: var(--dark); font-size: 20px; text-decoration: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.nav-back-arrow:hover { background: var(--bg-surface); transform: translateX(-3px); }
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-icon { background: var(--primary-gradient); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.nav-logo-text { font-size: 22px; font-weight: 800; color: var(--dark); }

/* --- Terminal Main Grid --- */
.container { max-width: 1320px; margin: 30px auto 0 auto; padding: 0 4%; display: grid; grid-template-columns: 320px 1fr; gap: 30px; align-items: start; }

/* Left Configuration Board */
.config-panel { background: var(--bg-surface); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 4px 12px rgba(15,23,42,0.01); }
.config-panel h2 { font-size: 15px; font-weight: 700; text-transform: uppercase; color: var(--slate); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.input-block { margin-bottom: 16px; }
.input-block label { display: block; font-size: 11px; font-weight: 700; color: var(--light-slate); text-transform: uppercase; margin-bottom: 6px; }
.input-block select, .input-block input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; outline: none; background: var(--bg-body); color: var(--dark); font-weight: 600; }
.start-btn { width: 100%; padding: 12px; background: var(--primary-gradient); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; font-size: 14.5px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

/* Right Live Chat System Frame */
.chat-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; height: 620px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); overflow: hidden; }
.chat-header { background: var(--bg-surface); padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.status-pill { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; color: #16a34a; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 30px; }
[data-theme="dark"] .status-pill { background: rgba(22, 163, 74, 0.15); }

/* Chat Logs sandbox scrolling zone */
.chat-logs { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: radial-gradient(var(--bg-body) 1px, transparent 0); background-size: 24px 24px; }
.msg-wrapper { display: flex; width: 100%; }
.msg-wrapper.bot { justify-content: flex-start; }
.msg-wrapper.user { justify-content: flex-end; }

.msg-bubble { max-width: 75%; padding: 14px 18px; border-radius: 14px; font-size: 14.5px; font-weight: 500; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.01); }
.bot .msg-bubble { background: var(--bg-body); color: var(--dark); border-top-left-radius: 0; border: 1px solid var(--border); }
.user .msg-bubble { background: var(--primary-gradient); color: white; border-top-right-radius: 0; }

/* Bottom Control Box Input bar */
.chat-footer { padding: 16px 24px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
.chat-footer textarea { flex: 1; height: 46px; padding: 11px 16px; border: 1px solid var(--border); border-radius: 24px; outline: none; background: var(--bg-body); color: var(--dark); font-size: 14px; font-weight: 500; resize: none; font-family: inherit; }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); transition: 0.2s; }
.send-btn:disabled { background: var(--light-slate); cursor: not-allowed; box-shadow: none; }

@media(max-width: 850px) { .container { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="javascript:history.back()" class="nav-back-arrow"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="/" class="nav-brand">
            <div class="nav-logo-icon"><i class="fa-solid fa-compass"></i></div>
            <div class="nav-logo-text">JobFinder Pro</div>
        </a>
    </div>
</nav>

<div class="container">
    
    <!-- Left Configuration Sidebar panel -->
    <div class="config-panel">
        <h2>Interview Setup</h2>
        <div class="input-block">
            <label>Target Interview Profile</label>
            <input type="text" id="target-role" value="{{ user_role if user_role else 'Python Developer' }}" placeholder="e.g. Frontend Developer">
        </div>
        <div class="input-block">
            <label>Difficulty Tier</label>
            <select id="diff-level">
                <option>Entry Level (Fresher)</option>
                <option selected>Mid-Senior (1-3 Years)</option>
                <option>Lead Engineer / Expert</option>
            </select>
        </div>
        <button class="start-btn" id="start-session-btn" onclick="initializeInterview()"><i class="fa-solid fa-play"></i> Start Live Mock Session</button>
    </div>

    <!-- Right Chat Simulator Box Terminal -->
    <div class="chat-panel">
        <div class="chat-header">
            <div>
                <span style="font-weight: 800; font-size: 16px;" id="bot-title-status">AI Interviewer Matrix</span>
                <p style="font-size: 12px; color: var(--slate);" id="session-subtext">Configure parameters and click launch.</p>
            </div>
            <div class="status-pill" id="live-indicator" style="display:none;"><i class="fa-solid fa-circle" style="font-size:8px; animation: blink 1s infinite;"></i> LIVE STANDBY</div>
        </div>

        <!-- Chat logs pipeline layer wrapper -->
        <div class="chat-logs" id="chat-logs-container">
            <!-- 🌟 Bot default welcome bubble changed completely to English -->
            <div class="msg-wrapper bot">
                <div class="msg-bubble">
                    Hello! I am your **AI Mock Interviewer**. Please configure your target job profile on the left sidebar and click **"Start Live Mock Session"** to launch the screening process instantly! 🚀
                </div>
            </div>
        </div>

        <!-- Bottom Text Bar Input Fields Container -->
        <div class="chat-footer">
            <textarea id="user-input-msg" placeholder="Type your response here..." disabled onkeydown="handleKeyPress(event)"></textarea>
            <button class="send-btn" id="send-msg-btn" onclick="submitUserAnswer()" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

</div>

<!-- LOCAL AI MOCK INTERVIEW CORE ALGORITHM MATRIX ENGINE SCRIPT -->
<script>
if (localStorage.getItem("theme") === "dark") { document.documentElement.setAttribute("data-theme", "dark"); }

const questionBank = {
    technical: [
        "Can you explain the core structural architecture details of your last development project?",
        "How do you optimize system execution latency parameters and bottleneck configurations when handling large scale traffic?",
        "Can you detail how you approach error debugging workflows and validation layers inside production modules?"
    ],
    behavioral: [
        "Tell me about a technical challenge where your implementation parameters broke, and how you hot-fixed it.",
        "How do you prioritize overlapping delivery deadlines when client specifications drift midway?"
    ]
};

let currentQuestionIndex = 0;
let interviewType = "technical"; 
let activeRole = "";
let answersLog = [];

function initializeInterview() {
    activeRole = document.getElementById("target-role").value.trim();
    if(!activeRole) activeRole = "Software Engineer";

    document.getElementById("bot-title-status").innerText = `Hiring Manager (${activeRole})`;
    document.getElementById("session-subtext").innerText = `Active Session • Total 5 Questions Tracking Framework`;
    document.getElementById("live-indicator").style.display = "inline-flex";
    document.getElementById("start-session-btn").innerHTML = `<i class="fa-solid fa-rotate"></i> Restart Session`;
    
    currentQuestionIndex = 0;
    interviewType = "technical";
    answersLog = [];

    const logsContainer = document.getElementById("chat-logs-container");
    logsContainer.innerHTML = "";

    // 🌟 Translation change to English
    appendMessage("bot", `Welcome! Let's begin the technical screening for the **${activeRole}** role. I will analyze your response matrix. Here is my first question:`);
    
    setTimeout(() => { sendBotQuestion(); }, 1200);

    document.getElementById("user-input-msg").disabled = false;
    document.getElementById("send-msg-btn").disabled = false;
    document.getElementById("user-input-msg").focus();
}

function sendBotQuestion() {
    let question = "";
    if (interviewType === "technical") {
        question = questionBank.technical[currentQuestionIndex];
    } else {
        question = questionBank.behavioral[currentQuestionIndex];
    }
    appendMessage("bot", `<strong>Question ${answersLog.length + 1}:</strong> ${question}`);
}

function submitUserAnswer() {
    const inputField = document.getElementById("user-input-msg");
    const answerText = inputField.value.trim();
    if (!answerText) return;

    appendMessage("user", answerText);
    inputField.value = ""; 
    
    answersLog.push({ questionIndex: currentQuestionIndex, type: interviewType, clientResponse: answerText });

    inputField.disabled = true;
    document.getElementById("send-msg-btn").disabled = true;

    setTimeout(() => {
        currentQuestionIndex++;
        
        // 🌟 Translation change to English
        if (interviewType === "technical" && currentQuestionIndex >= questionBank.technical.length) {
            interviewType = "behavioral";
            currentQuestionIndex = 0;
            appendMessage("bot", `Excellent core technical evaluation parameters. Now, let's pivot to some **Behavioral Framework Questions** to evaluate cultural compatibility metrics.`);
        }

        if (answersLog.length >= 5) {
            triggerFinalEvaluationReport();
        } else {
            sendBotQuestion();
            inputField.disabled = false;
            document.getElementById("send-msg-btn").disabled = false;
            inputField.focus();
        }
    }, 1500);
}

function triggerFinalEvaluationReport() {
    // 🌟 Translation change to English
    appendMessage("bot", `🎉 **Interview completed successfully!** Here is your structural diagnostic evaluation report based on your total response matrix logs:`);
    
    setTimeout(() => {
        let reviewReport = `
            <div style="background: rgba(37,99,235,0.05); padding:15px; border-radius:8px; border-left:4px solid #2563eb; margin-top:8px;">
                <h4 style="margin-bottom:6px; font-weight:800; color:#2563eb;"><i class="fa-solid fa-chart-pie"></i> EVALUATION REPORT SCORE: 8.5 / 10</h4>
                <p style="font-size:13px; color:var(--slate); margin-bottom:8px;"><strong>Technical Vector:</strong> Answers show a strong core structural understanding and optimal keyword density matching standard ATS pipeline filters indices.</p>
                <p style="font-size:13px; color:var(--slate);"><strong>Pro-Tip Recommendation:</strong> Try incorporating the Google STAR structure (Situation, Task, Action, Result) during behavioral question modules to achieve maximum impact tracking.</p>
            </div>
        `;
        const container = document.getElementById("chat-logs-container");
        const wrapper = document.createElement("div");
        wrapper.className = "msg-wrapper bot";
        wrapper.innerHTML = `<div class="msg-bubble">${reviewReport}</div>`;
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
        
        document.getElementById("session-subtext").innerText = `Session Evaluation Completed Successfully! 🏁`;
        document.getElementById("live-indicator").className = "status-pill";
        document.getElementById("live-indicator").style.background = "#e0f2fe";
        document.getElementById("live-indicator").style.color = "#0369a1";
        document.getElementById("live-indicator").innerHTML = `<i class="fa-solid fa-circle-check"></i> EVALUATED`;
    }, 1000);
}

function appendMessage(sender, text) {
    const container = document.getElementById("chat-logs-container");
    const wrapper = document.createElement("div");
    wrapper.className = `msg-wrapper ${sender}`;
    wrapper.innerHTML = `<div class="msg-bubble">${text}</div>`;
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight; 
}

function handleKeyPress(e) {
    if(e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitUserAnswer();
    }
}
</script>

<style>
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</body>
</html>
